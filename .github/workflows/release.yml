name: Publish to PyPI

# Publishes the package to PyPI whenever you publish a GitHub Release.
# Uses PyPI Trusted Publishing (OIDC) - no API token/secret to store.
#
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   PyPI project name: secapi-py
#   Owner:  secapi-dev
#   Repo:   secapi-python
#   Workflow filename: release.yml
#   Environment: pypi
# After that, create a GitHub Release (tag e.g. v0.1.0) and this runs.

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/secapi-py
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
